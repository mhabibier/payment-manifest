# k8s/overlays/production/kustomization.yaml
# Production overlay for payment-service.

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Namespace harus sinkron dengan base/payment-service
namespace: payment-service

resources:
  - ../../base

# ── Image: Gunakan tag semver yang spesifik di production ───────────────────
images:
  - name: registry.yourdomain.com/payment-microservice # Nama image dasar di folder base
    newName: registry.yourdomain.com/payment-microservice # Ganti ke image payment
    newTag: "1.0.0" # Gunakan versi rilis yang sudah stabil

# ── Patches ───────────────────────────────────────────────────────────────────
patches:
  # Patch Deployment: Skala lebih besar dan limit resource lebih ketat untuk prod
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: payment-service
        namespace: payment-service
      spec:
        replicas: 3
        template:
          spec:
            containers:
              - name: payment-service
                resources:
                  requests:
                    cpu:    "200m"
                    memory: "256Mi"
                  limits:
                    cpu:    "1000m"
                    memory: "512Mi"

  # Patch HPA: Rentang skala lebih lebar untuk trafik produksi
  - patch: |-
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: payment-service-hpa
        namespace: payment-service
      spec:
        minReplicas: 3
        maxReplicas: 20

# ── Production-specific config overrides ─────────────────────────────────────
configMapGenerator:
  - name: payment-service-config
    namespace: payment-service
    behavior: merge
    literals:
      - NODE_ENV=production
      - JWT_EXPIRES_IN=1h
