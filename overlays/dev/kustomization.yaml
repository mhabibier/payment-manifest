# k8s/overlays/development/kustomization.yaml
# Development overlay for payment-service.

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Namespace target untuk environment development
namespace: payment-service

resources:
  - ../../base

# ── Image: Menggunakan tag dev ───────────────────────────────────────────────
images:
  - name: registry.yourdomain.com/payment-microservice
    newTag: dev

# ── Patches ───────────────────────────────────────────────────────────────────
patches:
  # Patch Deployment: Mengurangi replika dan resource limits untuk dev
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: payment-service
        namespace: payment-service
      spec:
        replicas: 1
        template:
          spec:
            containers:
              - name: payment-service
                resources:
                  requests:
                    cpu:    "50m"
                    memory: "64Mi"
                  limits:
                    cpu:    "200m"
                    memory: "256Mi"

  # Patch HPA: Melonggarkan batasan scaling untuk dev
  - patch: |-
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: payment-service-hpa
        namespace: payment-service
      spec:
        minReplicas: 1
        maxReplicas: 3

# ── Dev-specific config overrides ─────────────────────────────────────────────
configMapGenerator:
  - name: payment-service-config
    namespace: payment-service
    behavior: merge
    literals:
      - NODE_ENV=development
      - SERVICE_VERSION=dev
