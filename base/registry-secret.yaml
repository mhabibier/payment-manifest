# k8s/base/registry-secret.yaml
# Docker registry credentials for pulling images from a self-hosted private registry.
#
# This Secret is of type kubernetes.io/dockerconfigjson.
# The Deployment references it via imagePullSecrets.
#
# ── How to create this Secret ────────────────────────────────────────────────
#
# Option A — kubectl (recommended, no base64 fiddling):
#
#   kubectl create secret docker-registry registry-credentials \
#     --namespace auth-service \
#     --docker-server=registry.yourdomain.com \
#     --docker-username=your-username \
#     --docker-password=your-password \
#     --docker-email=your-email@example.com
#
# Option B — from an existing docker login session:
#
#   docker login registry.yourdomain.com
#   kubectl create secret generic registry-credentials \
#     --namespace auth-service \
#     --from-file=.dockerconfigjson=$HOME/.docker/config.json \
#     --type=kubernetes.io/dockerconfigjson
#
# Option C — fill in the base64 value below manually:
#   Generate .dockerconfigjson:
#     AUTH=$(echo -n "username:password" | base64)
#     echo "{\"auths\":{\"registry.yourdomain.com\":{\"auth\":\"$AUTH\"}}}" | base64
#
# ─────────────────────────────────────────────────────────────────────────────
#
# ⚠️  DO NOT commit real credentials to git.
#     Use Sealed Secrets, External Secrets Operator, or Vault to manage this.

apiVersion: v1
kind: Secret
metadata:
  name: registry-credentials
  namespace: auth-service
  labels:
    app.kubernetes.io/name:      auth-microservice
    app.kubernetes.io/component: registry-secret
type: kubernetes.io/dockerconfigjson
data:
  # Replace this placeholder with your actual base64-encoded .dockerconfigjson
  # See Option C above for how to generate this value
  .dockerconfigjson: eyJhdXRocyI6eyJyZWdpc3RyeS55b3VyZG9tYWluLmNvbSI6eyJhdXRoIjoiWVhCd2JHbGpZWFJwYjI0NlVHRnpjM2R2Y21RPSJ9fX0=