apiVersion: v1
kind: ConfigMap
metadata:
  name: payment-service-config
  namespace: payment-service
  labels:
    app.kubernetes.io/name: payment-microservice
    app.kubernetes.io/component: config
data:
  PORT: "3000"
  NODE_ENV: "production"
  # Konfigurasi spesifik Payment (Contoh)
  PAYMENT_CURRENCY: "IDR"
  JWT_EXPIRES_IN: "1h"
  SERVICE_NAME: "payment-microservice"
  SERVICE_VERSION: "1.0.0"

  # ── Observability (Monitoring Stack) ──────────────────────────────────────
  # Format: http://<service-name>.<namespace>.svc.cluster.local:<port>
  # kube-prometheus-stack + Grafana Alloy in "monitoring" namespace:
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://alloy.monitoring.svc.cluster.local:4317"
  LOKI_HOST: "http://loki.monitoring.svc.cluster.local:3100"
